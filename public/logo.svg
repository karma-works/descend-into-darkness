<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280"
  role="img" aria-label="Descend into Darkness — a T-rex silhouette with a glowing orange eye, surrounded by concentric sound wave arcs on a dark cave background">
  <title>Descend into Darkness</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#030312"/>
    </linearGradient>

    <!-- Eye glow: orange halo behind the pupil -->
    <filter id="eyeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for sound waves and text -->
    <filter id="softGlow" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>

  <!-- ── STALACTITES ────────────────────────────────────────────────── -->
  <polygon points="25,0  38,44  51,0"  fill="#09091a" opacity="0.95"/>
  <polygon points="78,0  96,62  114,0" fill="#07071566" opacity="0.9"/>
  <polygon points="152,0 164,35 176,0" fill="#09091a" opacity="0.8"/>
  <polygon points="222,0 240,54 258,0" fill="#080814" opacity="0.9"/>
  <polygon points="555,0 574,58 593,0" fill="#080814" opacity="0.85"/>
  <polygon points="648,0 663,40 678,0" fill="#09091a" opacity="0.8"/>
  <polygon points="716,0 736,68 756,0" fill="#070712" opacity="0.9"/>
  <polygon points="772,0 784,30 796,0" fill="#09091a" opacity="0.75"/>

  <!-- ── DINO SILHOUETTE ────────────────────────────────────────────── -->
  <!-- Body: large rounded mass -->
  <ellipse cx="318" cy="152" rx="50" ry="36" fill="#0d0d1e"/>

  <!-- Neck: rises from the front-top of the body toward the head -->
  <path d="M 342,120 C 352,106 364,97 378,93 L 382,112 C 370,116 358,124 348,134 Z"
        fill="#0d0d1e"/>

  <!-- Head (upper skull) -->
  <path d="M 375,88
           C 394,82 416,84 430,95
           C 440,104 442,118 433,127
           C 425,134 410,136 396,132
           L 374,122
           C 362,115 360,98 368,90 Z"
        fill="#0d0d1e"/>

  <!-- Snout — extends the head rightward -->
  <path d="M 414,86
           C 433,83 454,88 464,100
           C 467,106 464,114 456,116
           L 428,114
           C 418,110 413,102 414,92 Z"
        fill="#0b0b1c"/>

  <!-- Lower jaw -->
  <path d="M 400,132 L 455,118
           C 460,120 461,127 456,132
           C 449,138 438,140 427,139
           L 402,136 Z"
        fill="#090918"/>

  <!-- Eye — glowing orange -->
  <circle cx="424" cy="100" r="6" fill="#ff5500" filter="url(#eyeGlow)"/>
  <circle cx="424" cy="100" r="3"   fill="#ffaa44"/>
  <circle cx="422" cy="98"  r="1.2" fill="#ffffff" opacity="0.6"/>

  <!-- Tiny arm -->
  <path d="M 336,145 L 350,157 L 342,165 L 328,155 Z" fill="#0b0b1c"/>

  <!-- Back hind legs -->
  <rect x="292" y="182" width="15" height="30" rx="5" fill="#0d0d1e"/>
  <path d="M 288,211 L 311,211 L 314,220 L 285,220 Z" fill="#0b0b1c"/>

  <rect x="321" y="178" width="15" height="28" rx="5" fill="#0c0c1c"/>
  <path d="M 317,205 L 340,205 L 343,214 L 314,214 Z" fill="#090918"/>

  <!-- Tail — sweeps left and tapers to a point -->
  <path d="M 272,145
           C 255,137 236,130 218,130
           C 207,130 202,137 207,143
           C 211,149 222,149 236,146
           C 252,142 268,150 275,158
           L 282,150 Z"
        fill="#0d0d1e"/>
  <ellipse cx="207" cy="137" rx="7" ry="4.5" fill="#0b0b1c"/>

  <!-- ── SOUND WAVES (concentric arcs, emanating rightward) ────────── -->
  <!-- All arcs are centred vertically at y=140, opening right (sweep=1) -->
  <g filter="url(#softGlow)">
    <!-- Wave 1 — closest, most opaque -->
    <path d="M 476,118 A 22,22 0 0,1 476,162"
          stroke="#88aaff" stroke-width="2.2" fill="none" opacity="0.60"/>
    <!-- Wave 2 -->
    <path d="M 508,106 A 34,34 0 0,1 508,174"
          stroke="#88aaff" stroke-width="1.9" fill="none" opacity="0.46"/>
    <!-- Wave 3 -->
    <path d="M 543,93 A 47,47 0 0,1 543,187"
          stroke="#88aaff" stroke-width="1.6" fill="none" opacity="0.33"/>
    <!-- Wave 4 -->
    <path d="M 580,79 A 61,61 0 0,1 580,201"
          stroke="#88aaff" stroke-width="1.3" fill="none" opacity="0.22"/>
    <!-- Wave 5 — faintest, widest -->
    <path d="M 620,63 A 77,77 0 0,1 620,217"
          stroke="#88aaff" stroke-width="1.0" fill="none" opacity="0.13"/>
  </g>

  <!-- ── TITLE ──────────────────────────────────────────────────────── -->
  <text x="400" y="250"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="29"
    font-weight="bold"
    letter-spacing="5"
    fill="#c8c8e0"
    filter="url(#softGlow)">DESCEND INTO DARKNESS</text>

  <!-- Subtitle -->
  <text x="400" y="271"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    letter-spacing="3"
    fill="#3d3d5e">a blind&#x2011;first audio platformer</text>

  <!-- Ambient cave dust (barely perceptible) -->
  <circle cx="58"  cy="195" r="1.5" fill="#88aaff" opacity="0.06"/>
  <circle cx="148" cy="228" r="1"   fill="#88aaff" opacity="0.05"/>
  <circle cx="703" cy="58"  r="1.5" fill="#88aaff" opacity="0.07"/>
  <circle cx="758" cy="204" r="1"   fill="#88aaff" opacity="0.05"/>
  <circle cx="178" cy="188" r="1"   fill="#88aaff" opacity="0.04"/>
</svg>
